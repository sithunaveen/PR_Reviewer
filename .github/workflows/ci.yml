name: GitAgent CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  validate-agents:
    name: Validate GitAgent Definitions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check agent.yaml files exist
        run: |
          echo "Validating GitAgent definition files..."
          for dir in agents/*/; do
            echo "Checking $dir"
            test -f "$dir/agent.yaml" && echo "  ✅ agent.yaml found" || (echo "  ❌ agent.yaml missing" && exit 1)
            test -f "$dir/SOUL.md"   && echo "  ✅ SOUL.md found"   || echo "  ⚠️  SOUL.md missing"
          done
          echo "✅ All agent definitions valid"

      - name: Check root GitAgent files
        run: |
          test -f "agent.yaml" && echo "✅ Root agent.yaml found" || exit 1
          test -f "SOUL.md"    && echo "✅ SOUL.md found"
          test -f "DUTIES.md"  && echo "✅ DUTIES.md found"
          test -f "RULES.md"   && echo "✅ RULES.md found"

      - name: Validate workflow definitions
        run: |
          test -f "workflows/pr-review-flow.yaml" && echo "✅ Workflow found" || exit 1

  lint-backend:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Check Python syntax
        run: |
          cd backend
          python -m py_compile main.py && echo "✅ main.py OK"
          python -m py_compile agent_runner.py && echo "✅ agent_runner.py OK"
          python -m py_compile github_fetcher.py && echo "✅ github_fetcher.py OK"
          python -m py_compile gitagent_loader.py && echo "✅ gitagent_loader.py OK"

  lint-frontend:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Check Next.js config
        run: |
          cd frontend
          test -f "next.config.js"     && echo "✅ next.config.js found"
          test -f "tailwind.config.js" && echo "✅ tailwind.config.js found"
          test -f "app/page.tsx"       && echo "✅ page.tsx found"
          echo "✅ Frontend structure valid"